<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daybook — add content</title>
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f4f5f6;color:#262a2e;line-height:1.5;padding:24px}
  .card{max-width:760px;margin:0 auto 16px;background:#fff;border:1px solid #e6e8ea;border-radius:18px;padding:22px 24px;box-shadow:0 10px 30px rgba(38,42,46,.07)}
  h1{font-size:23px;margin:0 0 3px} .sub{color:#69707a;font-size:14px;margin:0 0 14px}
  .env{font-size:12px;color:#69707a;background:#f7f8f9;border:1px solid #eceef0;border-radius:10px;padding:9px 12px;margin-bottom:14px;word-break:break-all} .env b{color:#262a2e}
  .row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}
  button{font:inherit;font-weight:600;border:0;border-radius:10px;padding:10px 15px;cursor:pointer;background:#262a2e;color:#fff}
  button.ghost{background:#fff;color:#262a2e;border:1px solid #d8dbde}
  button.tiny{padding:4px 9px;font-size:12px;background:#fff;color:#b23;border:1px solid #f0d4d4}
  button.seg{background:#fff;color:#262a2e;border:1px solid #d8dbde;font-size:13px;padding:7px 12px}
  button.seg[aria-pressed="true"]{background:#262a2e;color:#fff;border-color:#262a2e}
  button:disabled{opacity:.4;cursor:not-allowed}
  select,input[type=text],textarea{font:inherit;border:1px solid #d8dbde;border-radius:9px;padding:9px 11px;background:#fff}
  textarea{width:100%;resize:vertical;min-height:72px}
  label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#9aa1a9;display:block;margin-bottom:3px}
  .tabs{display:flex;gap:7px;margin-bottom:14px}
  .tab{font:inherit;font-weight:700;font-size:14px;border:1px solid #dcdcd8;background:#fff;color:#3c4247;border-radius:11px;padding:9px 16px;cursor:pointer}
  .tab[aria-pressed="true"]{background:#262a2e;color:#fff;border-color:#262a2e}
  .pane{display:none} .pane.on{display:block}
  .selrow{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:10px}
  .editor{display:grid;grid-template-columns:220px 1fr;gap:18px;margin-top:6px} @media(max-width:560px){.editor{grid-template-columns:1fr}}
  .frame{aspect-ratio:var(--ar,1/1);overflow:hidden;border-radius:9px;background:#e9eaec;position:relative}
  .frame img{width:100%;height:100%;object-fit:cover;object-position:var(--px,50%) var(--py,50%);display:block}
  .seg-row{display:flex;gap:6px} input[type=range]{width:100%} .grp{margin-bottom:12px} .auto{font-size:12px;color:#69707a;margin-top:2px}
  .list .part{margin-bottom:13px} .ph{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .pill{color:#fff;font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
  .pA{background:#f07400}.pB{background:#37a7d5}.pC{background:#fa1c8b}.pD{background:#87ad3e}
  .ph .nm{font-weight:600;font-size:14px} .ph .ct{margin-left:auto;color:#9aa1a9;font-size:12px}
  .it{display:flex;gap:10px;align-items:flex-start;border:1px solid #eceef0;border-radius:10px;padding:9px 11px;margin-bottom:7px}
  .it .thumb{width:42px;height:42px;border-radius:7px;object-fit:cover;flex:none}
  .it .ty{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#9aa1a9} .it .tx{font-size:13.5px} .it .body{flex:1;min-width:0}
  #log{background:#0f1216;color:#d7e0e6;border-radius:12px;padding:11px 14px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.5;max-height:160px;overflow:auto;white-space:pre-wrap}
  .ln{display:block} .ok{color:#7fd6a0} .err{color:#ff8b8b} .step{color:#86b7ff} .dim{color:#8b95a0}
</style>
</head>
<body>
  <div class="card">
    <h1>Daybook · add content</h1>
    <p class="sub">Sign in once, then pour in as many entries and photos as you like. Everything lands in the same folder, ready for step 4 to assemble.</p>
    <div class="env">Origin: <b id="origin">…</b> · Scope: <b>drive.file</b> · Folder: <b>Tallis Arts Award</b></div>
    <div class="row">
      <button id="signin">Sign in with Google</button>
      <button id="signout" class="ghost" disabled>Sign out</button>
      <button id="reload" class="ghost" disabled>Reload list</button>
    </div>
  </div>

  <div class="card" id="work" style="display:none">
    <div class="tabs">
      <button class="tab" id="tab-text" aria-pressed="true" onclick="setTab('text')">✍️ Write an entry</button>
      <button class="tab" id="tab-photo" aria-pressed="false" onclick="setTab('photo')">📷 Add a photo</button>
    </div>

    <div class="pane on" id="pane-text">
      <div class="selrow">
        <div><label>Part</label>
          <select id="part"><option value="A">A · Taking part</option><option value="B">B · Being the audience</option><option value="C">C · Arts inspiration</option><option value="D">D · Arts skill share</option></select></div>
        <div><label>Stage</label><select id="kind"><option>Plan</option><option selected>Evidence</option><option>Review</option></select></div>
        <div><label>Type</label><select id="type"><option selected>Diary</option><option>Note</option><option>Quote</option><option>Review</option></select></div>
      </div>
      <label>Entry</label>
      <textarea id="text" placeholder="Write whatever a pupil might jot down…"></textarea>
      <div class="row" style="margin-top:11px"><button id="saveText">Save entry</button><span id="savingText" class="dim" style="font-size:13px"></span></div>
    </div>

    <div class="pane" id="pane-photo">
      <div class="row" style="margin-bottom:12px"><button id="pick" class="ghost">Choose a photo…</button><input type="file" id="file" accept="image/*" style="display:none"></div>
      <div id="photoEditor" style="display:none">
        <div class="editor">
          <div><div class="frame" id="preview"><img id="prevImg" alt=""></div><div class="auto" id="autonote"></div></div>
          <div>
            <div class="grp"><label>Frame</label><div class="seg-row" id="frames"></div></div>
            <div class="grp"><label>Move across</label><input type="range" id="px" min="0" max="100" value="50"></div>
            <div class="grp"><label>Move up / down</label><input type="range" id="py" min="0" max="100" value="50"></div>
            <div class="grp"><label>Part</label><select id="ipart"><option value="A">A · Taking part</option><option value="B">B · Being the audience</option><option value="C" selected>C · Arts inspiration</option><option value="D">D · Arts skill share</option></select></div>
            <div class="grp"><label>Caption</label><input type="text" id="caption" style="width:100%" placeholder="A line about this photo"></div>
            <div class="row"><button id="savePhoto">Save photo</button><span id="savingPhoto" class="dim" style="font-size:13px"></span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card" id="listCard" style="display:none"><div class="list" id="list"></div></div>
  <div class="card"><div id="log"><span class="ln dim">Waiting for Google sign-in library…</span></div></div>

<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
<script>
  const CLIENT_ID='53261082370-dhkqc0n753jcvr4cvs5r0tim8q72dl2n.apps.googleusercontent.com';
  const SCOPE='https://www.googleapis.com/auth/drive.file';
  const FOLDER='Tallis Arts Award';
  const PARTS={A:"Taking part",B:"Being the audience",C:"Arts inspiration",D:"Arts skill share"};
  const ORDER={Plan:0,Evidence:1,Review:2};
  const FRAMES={portrait:{ar:'3 / 4',r:0.75,label:'Portrait'},square:{ar:'1 / 1',r:1,label:'Square'},landscape:{ar:'4 / 3',r:1.3333,label:'Landscape'}};
  const ARMAP={portrait:'3 / 4',square:'1 / 1',landscape:'4 / 3'};

  let tokenClient=null,token=null,folderId=null,urls=[],cur=null,listing=[];
  const $=id=>document.getElementById(id);
  $('origin').textContent=location.origin;
  function log(m,c){const e=document.createElement('span');e.className='ln'+(c?' '+c:'');e.textContent=m;$('log').appendChild(e);$('log').scrollTop=$('log').scrollHeight;}
  const auth=()=>({Authorization:'Bearer '+token});
  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  window.setTab=(t)=>{ $('tab-text').setAttribute('aria-pressed',t==='text'); $('tab-photo').setAttribute('aria-pressed',t==='photo'); $('pane-text').className='pane'+(t==='text'?' on':''); $('pane-photo').className='pane'+(t==='photo'?' on':''); };

  function gisLoaded(){
    tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPE,callback:async(r)=>{
      if(r.error){log('Sign-in failed: '+r.error,'err');return;}
      token=r.access_token; log('Signed in.','ok'); $('signout').disabled=false;$('reload').disabled=false;$('signin').disabled=true;$('work').style.display='block';$('listCard').style.display='block';
      try{ await ensureFolder(); await loadList(); }catch(e){ log(e.message,'err'); }
    }});
    log('Library ready. You can sign in.','dim');
  }
  $('signin').onclick=()=>{ if(tokenClient) tokenClient.requestAccessToken({prompt:'consent'}); };
  $('signout').onclick=()=>{ if(token) google.accounts.oauth2.revoke(token,()=>{}); token=null;folderId=null;$('work').style.display='none';$('listCard').style.display='none';$('signin').disabled=false;$('signout').disabled=true;$('reload').disabled=true;log('Signed out.','dim'); };
  $('reload').onclick=async()=>{ try{ await loadList(); }catch(e){ log(e.message,'err'); } };

  async function api(url,opts){
    const r=await fetch(url,opts||{headers:auth()});
    if(r.status===401){ log('Session expired — sign in again.','err'); throw new Error('401'); }
    if(!r.ok){ throw new Error('HTTP '+r.status+': '+(await r.text()).slice(0,200)); }
    return r;
  }
  async function ensureFolder(){
    const q="mimeType='application/vnd.google-apps.folder' and name='"+FOLDER+"' and trashed=false";
    const d=await (await api('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name)',{headers:auth()})).json();
    if(d.files&&d.files.length){ folderId=d.files[0].id; log('Found your daybook folder.','dim'); return; }
    const cr=await api('https://www.googleapis.com/drive/v3/files?fields=id',{method:'POST',headers:Object.assign(auth(),{'Content-Type':'application/json'}),body:JSON.stringify({name:FOLDER,mimeType:'application/vnd.google-apps.folder'})});
    folderId=(await cr.json()).id; log('Created a daybook folder in your Drive.','ok');
  }

  // ---- text entry ----
  $('saveText').onclick=async()=>{
    if(!folderId){ log('No folder yet.','err'); return; }
    const entry={part:$('part').value,kind:$('kind').value,type:$('type').value,text:$('text').value,createdAt:new Date().toISOString()};
    if(!entry.text.trim()){ log('Entry is empty.','dim'); return; }
    $('savingText').textContent='saving…';
    try{
      log('Saving a '+entry.kind+' entry to Part '+entry.part+'…','step');
      const boundary='db'+Date.now();
      const metadata={name:entry.part+'-'+entry.kind+'-'+Date.now()+'.json',mimeType:'application/json',parents:[folderId],appProperties:{app:'daybook',part:entry.part,kind:entry.kind,type:entry.type}};
      const body='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(metadata)+'\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+JSON.stringify(entry)+'\r\n--'+boundary+'--';
      await api('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:Object.assign(auth(),{'Content-Type':'multipart/related; boundary='+boundary}),body});
      log('Saved entry.','ok'); $('savingText').textContent=''; $('text').value='';
      await loadList();
    }catch(e){ log('Save failed: '+e.message,'err'); $('savingText').textContent=''; }
  };

  // ---- photo ----
  $('pick').onclick=()=>$('file').click();
  function pickFrame(ratio){let best='square',bd=9;for(const k in FRAMES){const d=Math.abs(Math.log(ratio/FRAMES[k].r));if(d<bd){bd=d;best=k;}}return best;}
  async function processFile(file){
    let w,h,bitmap=null;
    try{ bitmap=await createImageBitmap(file,{imageOrientation:'from-image'}); w=bitmap.width; h=bitmap.height; }
    catch(_){ const im=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=URL.createObjectURL(file);}); w=im.naturalWidth;h=im.naturalHeight;bitmap=im; }
    const max=1600, scale=Math.min(1,max/Math.max(w,h)), cw=Math.round(w*scale), ch=Math.round(h*scale);
    const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch; cv.getContext('2d').drawImage(bitmap,0,0,cw,ch);
    const blob=await new Promise(res=>cv.toBlob(res,'image/jpeg',0.85));
    return {blob, ratio:w/h, srcW:w, srcH:h, outW:cw, outH:ch};
  }
  $('file').onchange=async(ev)=>{
    const file=ev.target.files&&ev.target.files[0]; if(!file) return;
    log('Reading "'+file.name+'" ('+Math.round(file.size/1024)+' KB)…','step');
    try{
      const p=await processFile(file);
      if(cur&&cur.url) URL.revokeObjectURL(cur.url);
      const url=URL.createObjectURL(p.blob);
      cur={blob:p.blob, frame:pickFrame(p.ratio), px:50, py:50, url};
      log('Straightened to '+p.outW+'×'+p.outH+' ('+Math.round(p.blob.size/1024)+' KB). Nearest frame: '+FRAMES[cur.frame].label+'.','ok');
      $('photoEditor').style.display='block'; $('prevImg').src=url; renderEditor();
    }catch(e){ log('Could not read that image: '+e.message,'err'); }
    ev.target.value='';
  };
  function renderEditor(){
    $('frames').innerHTML=Object.keys(FRAMES).map(k=>'<button class="seg" data-f="'+k+'" aria-pressed="'+(k===cur.frame)+'">'+FRAMES[k].label+'</button>').join('');
    $('frames').querySelectorAll('button').forEach(b=>b.onclick=()=>{cur.frame=b.dataset.f;applyPreview();$('frames').querySelectorAll('button').forEach(x=>x.setAttribute('aria-pressed',x.dataset.f===cur.frame));});
    $('px').value=cur.px; $('py').value=cur.py;
    $('px').oninput=()=>{cur.px=+$('px').value;applyPreview();}; $('py').oninput=()=>{cur.py=+$('py').value;applyPreview();};
    $('autonote').textContent='Auto-fitted to '+FRAMES[cur.frame].label.toLowerCase()+'. Override the frame or nudge the crop.';
    applyPreview();
  }
  function applyPreview(){ const pv=$('preview'); pv.style.setProperty('--ar',FRAMES[cur.frame].ar); pv.style.setProperty('--px',cur.px+'%'); pv.style.setProperty('--py',cur.py+'%'); }
  $('savePhoto').onclick=async()=>{
    if(!cur||!folderId){ log('Nothing to save yet.','err'); return; }
    $('savingPhoto').textContent='saving…';
    try{
      const part=$('ipart').value, caption=$('caption').value;
      log('Uploading the photo to Part '+part+'…','step');
      const meta={name:'IMG-'+part+'-'+Date.now()+'.jpg',mimeType:'image/jpeg',parents:[folderId],appProperties:{app:'daybook',part,type:'Photo',kind:'Evidence',caption,frame:cur.frame,px:String(cur.px),py:String(cur.py)}};
      const boundary='img'+Date.now();
      const pre='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(meta)+'\r\n--'+boundary+'\r\nContent-Type: image/jpeg\r\n\r\n';
      const body=new Blob([pre, cur.blob, '\r\n--'+boundary+'--'],{type:'multipart/related; boundary='+boundary});
      await api('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:Object.assign(auth(),{'Content-Type':'multipart/related; boundary='+boundary}),body});
      log('Saved photo to Part '+part+', framed '+cur.frame+'.','ok');
      $('savingPhoto').textContent=''; $('photoEditor').style.display='none'; $('caption').value='';
      if(cur.url) URL.revokeObjectURL(cur.url); cur=null;
      await loadList();
    }catch(e){ log('Upload failed: '+e.message,'err'); $('savingPhoto').textContent=''; }
  };

  // ---- list ----
  async function loadList(){
    log('Listing what is in your folder…','step');
    urls.forEach(u=>URL.revokeObjectURL(u)); urls=[];
    const q="'"+folderId+"' in parents and trashed=false";
    const d=await (await api('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name,mimeType,appProperties,createdTime)&orderBy=createdTime&pageSize=300',{headers:auth()})).json();
    const all=(d.files||[]).filter(f=>(f.appProperties||{}).app==='daybook'&&(f.appProperties||{}).kind!=='manifest');
    listing=await Promise.all(all.map(async f=>{
      const a=f.appProperties||{};
      if((f.mimeType||'').indexOf('image/')===0){
        const b=await (await api('https://www.googleapis.com/drive/v3/files/'+f.id+'?alt=media',{headers:auth()})).blob();
        const u=URL.createObjectURL(b); urls.push(u);
        return {id:f.id,isImg:true,part:a.part||'C',kind:a.kind||'Evidence',type:a.type||'Photo',caption:a.caption||'',url:u};
      }
      let c={}; try{ c=await (await api('https://www.googleapis.com/drive/v3/files/'+f.id+'?alt=media',{headers:auth()})).json(); }catch(_){}
      return {id:f.id,isImg:false,part:c.part||a.part||'A',kind:c.kind||a.kind||'Evidence',type:c.type||a.type||'Note',text:c.text||''};
    }));
    log('Folder has '+listing.length+' item'+(listing.length===1?'':'s')+' ('+listing.filter(i=>i.isImg).length+' photo, '+listing.filter(i=>!i.isImg).length+' written).','ok');
    renderList();
  }
  function renderList(){
    let html='<h2 style="font-size:16px;margin:2px 0 12px">In your folder</h2>';
    Object.keys(PARTS).forEach(p=>{
      const its=listing.filter(i=>i.part===p).sort((a,b)=>(ORDER[a.kind]??9)-(ORDER[b.kind]??9));
      html+='<div class="part"><div class="ph"><span class="pill p'+p+'">Part '+p+'</span><span class="nm">'+PARTS[p]+'</span><span class="ct">'+its.length+'</span></div>';
      if(!its.length) html+='<div style="color:#9aa1a9;font-size:13px;font-style:italic">nothing yet</div>';
      its.forEach(it=>{
        const thumb=it.isImg?'<img class="thumb" src="'+it.url+'" alt="">':'';
        const label=it.isImg?esc(it.caption||'(photo)'):esc((it.text||'').slice(0,80))+((it.text||'').length>80?'…':'');
        html+='<div class="it">'+thumb+'<div class="body"><div class="ty">'+esc(it.kind)+' · '+esc(it.type)+'</div><div class="tx">'+label+'</div></div><button class="tiny" onclick="delItem(\''+it.id+'\')">delete</button></div>';
      });
      html+='</div>';
    });
    $('list').innerHTML=html;
  }
  window.delItem=async(id)=>{ if(!confirm('Delete this from your Drive?'))return; try{ await api('https://www.googleapis.com/drive/v3/files/'+id,{method:'DELETE',headers:auth()}); log('Deleted one item.','dim'); await loadList(); }catch(e){ log('Delete failed: '+e.message,'err'); } };
</script>
</body>
</html>
