<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daybook — step 1: entries that persist</title>
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f4f5f6;color:#262a2e;line-height:1.5;padding:24px}
  .card{max-width:720px;margin:0 auto;background:#fff;border:1px solid #e6e8ea;border-radius:18px;padding:24px 26px;box-shadow:0 10px 30px rgba(38,42,46,.07)}
  h1{font-size:23px;margin:0 0 3px} .sub{color:#69707a;font-size:14px;margin:0 0 16px}
  .env{font-size:12px;color:#69707a;background:#f7f8f9;border:1px solid #eceef0;border-radius:10px;padding:9px 12px;margin-bottom:16px;word-break:break-all}
  .env b{color:#262a2e}
  .row{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  button{font:inherit;font-weight:600;border:0;border-radius:10px;padding:10px 15px;cursor:pointer;background:#262a2e;color:#fff}
  button.ghost{background:#fff;color:#262a2e;border:1px solid #d8dbde}
  button.tiny{padding:4px 9px;font-size:12px;font-weight:600;background:#fff;color:#b23;border:1px solid #f0d4d4}
  button:disabled{opacity:.4;cursor:not-allowed}
  select,textarea{font:inherit;border:1px solid #d8dbde;border-radius:9px;padding:9px 11px;background:#fff}
  textarea{width:100%;resize:vertical;min-height:72px}
  .form{border:1px solid #e6e8ea;border-radius:14px;padding:15px;margin-bottom:18px;background:#fcfcfd}
  .form .selrow{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:10px}
  label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#9aa1a9;display:block;margin-bottom:3px}
  .daybook h2{font-size:16px;margin:18px 0 10px}
  .part{margin-bottom:16px}
  .part-h{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .pill{color:#fff;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px}
  .pA{background:#f07400}.pB{background:#37a7d5}.pC{background:#fa1c8b}.pD{background:#87ad3e}
  .part-h .nm{font-weight:600;font-size:14px} .part-h .ct{color:#9aa1a9;font-size:12.5px;margin-left:auto}
  .entry{border:1px solid #eceef0;border-radius:11px;padding:11px 13px;margin-bottom:8px;background:#fff}
  .entry .meta{display:flex;gap:8px;align-items:center;margin-bottom:4px}
  .chip{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#69707a;background:#f1f2f4;padding:2px 7px;border-radius:5px}
  .entry .when{font-size:11.5px;color:#9aa1a9;margin-left:auto}
  .entry .tx{font-size:14px;white-space:pre-wrap}
  .empty{color:#9aa1a9;font-size:13px;font-style:italic}
  #log{margin-top:16px;background:#0f1216;color:#d7e0e6;border-radius:12px;padding:12px 14px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.5;max-height:200px;overflow:auto;white-space:pre-wrap}
  .ln{display:block} .ok{color:#7fd6a0} .err{color:#ff8b8b} .step{color:#86b7ff} .dim{color:#8b95a0}
</style>
</head>
<body>
  <div class="card">
    <h1>Daybook · step 1 — entries that persist</h1>
    <p class="sub">Write an entry, file it under a part, and reload the page. It should still be here, rebuilt from your Drive.</p>
    <div class="env">
      Origin: <b id="origin">…</b> · Scope: <b>drive.file</b> · Folder: <b>Tallis Arts Award</b>
    </div>

    <div class="row">
      <button id="signin">Sign in with Google</button>
      <button id="signout" class="ghost" disabled>Sign out</button>
      <button id="reload" class="ghost" disabled>Reload from Drive</button>
    </div>

    <div class="form" id="form" style="display:none">
      <div class="selrow">
        <div><label>Part</label>
          <select id="part">
            <option value="A">A · Taking part</option>
            <option value="B">B · Being the audience</option>
            <option value="C">C · Arts inspiration</option>
            <option value="D">D · Arts skill share</option>
          </select></div>
        <div><label>Stage</label>
          <select id="kind"><option>Plan</option><option selected>Evidence</option><option>Review</option></select></div>
        <div><label>Type</label>
          <select id="type"><option selected>Diary</option><option>Note</option><option>Quote</option><option>Review</option></select></div>
      </div>
      <label>Your entry</label>
      <textarea id="text" placeholder="Write whatever a pupil might jot down…">Week 3 — kept the bowl centred for a whole minute today. First thing I've made that I actually want to keep.</textarea>
      <div class="row" style="margin:11px 0 0">
        <button id="save">Save entry to my Drive</button>
        <span id="saving" class="dim" style="font-size:13px"></span>
      </div>
    </div>

    <div class="daybook" id="daybook"></div>

    <div id="log"><span class="ln dim">Waiting for Google sign-in library…</span></div>
  </div>

<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
<script>
  const CLIENT_ID='53261082370-dhkqc0n753jcvr4cvs5r0tim8q72dl2n.apps.googleusercontent.com';
  const SCOPE='https://www.googleapis.com/auth/drive.file';
  const FOLDER='Tallis Arts Award';
  const PARTS={A:"Taking part",B:"Being the audience",C:"Arts inspiration",D:"Arts skill share"};

  let tokenClient=null, token=null, folderId=null, entries=[];
  const $=id=>document.getElementById(id);
  document.getElementById('origin').textContent=location.origin;
  function log(m,c){const e=document.createElement('span');e.className='ln'+(c?' '+c:'');e.textContent=m;$('log').appendChild(e);$('log').scrollTop=$('log').scrollHeight;}
  function signedIn(on){$('signout').disabled=!on;$('reload').disabled=!on;$('signin').disabled=on;$('form').style.display=on?'block':'none';}

  function gisLoaded(){
    tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPE,callback:async(r)=>{
      if(r.error){log('Sign-in failed: '+r.error,'err');return;}
      token=r.access_token; log('Signed in.','ok'); signedIn(true);
      try{ await ensureFolder(); await loadEntries(); }catch(e){ log(e.message,'err'); }
    }});
    log('Library ready. You can sign in.','dim');
  }
  $('signin').onclick=()=>{ if(tokenClient) tokenClient.requestAccessToken({prompt:'consent'}); };
  $('signout').onclick=()=>{ if(token) google.accounts.oauth2.revoke(token,()=>{}); token=null;folderId=null;entries=[];signedIn(false);$('daybook').innerHTML='';log('Signed out.','dim'); };
  $('reload').onclick=async()=>{ try{ await loadEntries(); }catch(e){ log(e.message,'err'); } };

  async function api(url,opts){
    const r=await fetch(url,opts||{headers:{Authorization:'Bearer '+token}});
    if(r.status===401){ log('Session expired — please sign in again.','err'); signedIn(false); throw new Error('401'); }
    if(!r.ok){ throw new Error('HTTP '+r.status+': '+(await r.text()).slice(0,200)); }
    return r;
  }
  const auth=()=>({Authorization:'Bearer '+token});

  async function ensureFolder(){
    const q="mimeType='application/vnd.google-apps.folder' and name='"+FOLDER+"' and trashed=false";
    const r=await api('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name)',{headers:auth()});
    const d=await r.json();
    if(d.files&&d.files.length){ folderId=d.files[0].id; log('Found your daybook folder.','dim'); return; }
    const meta={name:FOLDER,mimeType:'application/vnd.google-apps.folder'};
    const cr=await api('https://www.googleapis.com/drive/v3/files?fields=id',{method:'POST',headers:Object.assign(auth(),{'Content-Type':'application/json'}),body:JSON.stringify(meta)});
    folderId=(await cr.json()).id; log('Created a daybook folder in your Drive.','ok');
  }

  $('save').onclick=async()=>{
    if(!folderId){ log('No folder yet.','err'); return; }
    const entry={part:$('part').value,kind:$('kind').value,type:$('type').value,text:$('text').value,createdAt:new Date().toISOString()};
    if(!entry.text.trim()){ log('Nothing to save — the entry is empty.','dim'); return; }
    $('saving').textContent='saving…';
    try{
      log('Saving a '+entry.kind+' entry to Part '+entry.part+'…','step');
      const boundary='db'+Date.now();
      const metadata={name:entry.part+'-'+entry.kind+'-'+Date.now()+'.json',mimeType:'application/json',parents:[folderId],appProperties:{app:'daybook',part:entry.part,kind:entry.kind,type:entry.type}};
      const body='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(metadata)+'\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+JSON.stringify(entry)+'\r\n--'+boundary+'--';
      await api('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:Object.assign(auth(),{'Content-Type':'multipart/related; boundary='+boundary}),body});
      log('Saved.','ok'); $('saving').textContent=''; $('text').value='';
      await loadEntries();
    }catch(e){ log('Save failed: '+e.message,'err'); $('saving').textContent=''; }
  };

  async function loadEntries(){
    log('Rebuilding your daybook from Drive…','step');
    const q="'"+folderId+"' in parents and trashed=false and mimeType='application/json'";
    const r=await api('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name,createdTime,appProperties)&orderBy=createdTime&pageSize=200',{headers:auth()});
    const d=await r.json();
    const files=d.files||[];
    entries=await Promise.all(files.map(async f=>{
      const c=await (await api('https://www.googleapis.com/drive/v3/files/'+f.id+'?alt=media',{headers:auth()})).json();
      return Object.assign({id:f.id},c);
    }));
    log('Loaded '+entries.length+' entr'+(entries.length===1?'y':'ies')+' from Drive.','ok');
    render();
  }

  window.delEntry=async(id)=>{
    if(!confirm('Delete this entry from your Drive?')) return;
    try{ await api('https://www.googleapis.com/drive/v3/files/'+id,{method:'DELETE',headers:auth()}); log('Deleted one entry.','dim'); await loadEntries(); }
    catch(e){ log('Delete failed: '+e.message,'err'); }
  };

  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function render(){
    let html='<h2>Your daybook</h2>';
    Object.keys(PARTS).forEach(p=>{
      const its=entries.filter(e=>e.part===p).sort((a,b)=>(a.createdAt||'').localeCompare(b.createdAt||''));
      html+='<div class="part"><div class="part-h"><span class="pill p'+p+'">Part '+p+'</span><span class="nm">'+PARTS[p]+'</span><span class="ct">'+its.length+' '+(its.length===1?'entry':'entries')+'</span></div>';
      if(!its.length){ html+='<div class="empty">nothing filed here yet</div>'; }
      else its.forEach(e=>{
        const when=e.createdAt?new Date(e.createdAt).toLocaleString():'';
        html+='<div class="entry"><div class="meta"><span class="chip">'+esc(e.kind)+'</span><span class="chip">'+esc(e.type)+'</span><span class="when">'+when+'</span></div><div class="tx">'+esc(e.text)+'</div><div style="margin-top:7px"><button class="tiny" onclick="delEntry(\''+e.id+'\')">delete</button></div></div>';
      });
      html+='</div>';
    });
    $('daybook').innerHTML=html;
  }
</script>
</body>
</html>
