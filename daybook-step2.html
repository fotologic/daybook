<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daybook — step 2: images that fit</title>
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f4f5f6;color:#262a2e;line-height:1.5;padding:24px}
  .card{max-width:760px;margin:0 auto;background:#fff;border:1px solid #e6e8ea;border-radius:18px;padding:24px 26px;box-shadow:0 10px 30px rgba(38,42,46,.07)}
  h1{font-size:23px;margin:0 0 3px} .sub{color:#69707a;font-size:14px;margin:0 0 16px}
  .env{font-size:12px;color:#69707a;background:#f7f8f9;border:1px solid #eceef0;border-radius:10px;padding:9px 12px;margin-bottom:16px;word-break:break-all} .env b{color:#262a2e}
  .row{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  button{font:inherit;font-weight:600;border:0;border-radius:10px;padding:10px 15px;cursor:pointer;background:#262a2e;color:#fff}
  button.ghost{background:#fff;color:#262a2e;border:1px solid #d8dbde}
  button.tiny{padding:4px 9px;font-size:12px;background:#fff;color:#b23;border:1px solid #f0d4d4}
  button.seg{background:#fff;color:#262a2e;border:1px solid #d8dbde;font-size:13px;padding:7px 12px}
  button.seg[aria-pressed="true"]{background:#262a2e;color:#fff;border-color:#262a2e}
  button:disabled{opacity:.4;cursor:not-allowed}
  select,input[type=text]{font:inherit;border:1px solid #d8dbde;border-radius:9px;padding:9px 11px;background:#fff}
  label{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#9aa1a9;display:block;margin-bottom:3px}
  .form{border:1px solid #e6e8ea;border-radius:14px;padding:16px;margin-bottom:18px;background:#fcfcfd;display:none}
  .editor{display:grid;grid-template-columns:220px 1fr;gap:18px;margin-top:6px}
  @media(max-width:560px){.editor{grid-template-columns:1fr}}
  .frame{aspect-ratio:var(--ar,1/1);overflow:hidden;border-radius:9px;background:#e9eaec;position:relative}
  .frame img{width:100%;height:100%;object-fit:cover;object-position:var(--px,50%) var(--py,50%);display:block}
  .ctrls .grp{margin-bottom:12px}
  .seg-row{display:flex;gap:6px}
  input[type=range]{width:100%}
  .auto{font-size:12px;color:#69707a;margin-top:2px}
  .wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:13px}
  .shot .frame{margin-bottom:6px}
  .shot .cap{font-size:12.5px;color:#3c4247} .shot .pchip{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#fff;padding:2px 7px;border-radius:5px;display:inline-block;margin-bottom:4px}
  .pA{background:#f07400}.pB{background:#37a7d5}.pC{background:#fa1c8b}.pD{background:#87ad3e}
  #log{margin-top:16px;background:#0f1216;color:#d7e0e6;border-radius:12px;padding:12px 14px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;line-height:1.5;max-height:200px;overflow:auto;white-space:pre-wrap}
  .ln{display:block} .ok{color:#7fd6a0} .err{color:#ff8b8b} .step{color:#86b7ff} .dim{color:#8b95a0}
</style>
</head>
<body>
  <div class="card">
    <h1>Daybook · step 2 — images that fit</h1>
    <p class="sub">Add a photo. It gets straightened, shrunk, and fitted into a bounded frame. Save it, reload, and it returns from Drive exactly as you framed it.</p>
    <div class="env">Origin: <b id="origin">…</b> · Scope: <b>drive.file</b> · Folder: <b>Tallis Arts Award</b></div>

    <div class="row">
      <button id="signin">Sign in with Google</button>
      <button id="signout" class="ghost" disabled>Sign out</button>
      <button id="reload" class="ghost" disabled>Reload from Drive</button>
      <button id="pick" class="ghost" disabled>Add a photo…</button>
      <input type="file" id="file" accept="image/*" style="display:none">
    </div>

    <div class="form" id="form">
      <div class="editor">
        <div><div class="frame" id="preview"><img id="prevImg" alt=""></div><div class="auto" id="autonote"></div></div>
        <div class="ctrls">
          <div class="grp"><label>Frame</label><div class="seg-row" id="frames"></div></div>
          <div class="grp"><label>Move across</label><input type="range" id="px" min="0" max="100" value="50"></div>
          <div class="grp"><label>Move up / down</label><input type="range" id="py" min="0" max="100" value="50"></div>
          <div class="grp"><label>Part</label>
            <select id="part"><option value="A">A · Taking part</option><option value="B">B · Being the audience</option><option value="C" selected>C · Arts inspiration</option><option value="D">D · Arts skill share</option></select></div>
          <div class="grp"><label>Caption</label><input type="text" id="caption" style="width:100%" value="My quilt study, after Faith Ringgold"></div>
          <div class="row" style="margin:4px 0 0"><button id="save">Save to my Drive</button><span id="saving" class="dim" style="font-size:13px"></span></div>
        </div>
      </div>
    </div>

    <div id="wallWrap"></div>
    <div id="log"><span class="ln dim">Waiting for Google sign-in library…</span></div>
  </div>

<script src="https://accounts.google.com/gsi/client" async defer onload="gisLoaded()"></script>
<script>
  const CLIENT_ID='53261082370-dhkqc0n753jcvr4cvs5r0tim8q72dl2n.apps.googleusercontent.com';
  const SCOPE='https://www.googleapis.com/auth/drive.file';
  const FOLDER='Tallis Arts Award';
  const PARTS={A:"Taking part",B:"Being the audience",C:"Arts inspiration",D:"Arts skill share"};
  const FRAMES={portrait:{ar:'3 / 4',r:0.75,label:'Portrait'},square:{ar:'1 / 1',r:1,label:'Square'},landscape:{ar:'4 / 3',r:1.3333,label:'Landscape'}};

  let tokenClient=null, token=null, folderId=null, urls=[];
  let cur=null; // {blob, ratio, frame, px, py, url}
  const $=id=>document.getElementById(id);
  $('origin').textContent=location.origin;
  function log(m,c){const e=document.createElement('span');e.className='ln'+(c?' '+c:'');e.textContent=m;$('log').appendChild(e);$('log').scrollTop=$('log').scrollHeight;}
  function signedIn(on){$('signout').disabled=!on;$('reload').disabled=!on;$('pick').disabled=!on;$('signin').disabled=on;}
  const auth=()=>({Authorization:'Bearer '+token});

  function gisLoaded(){
    tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPE,callback:async(r)=>{
      if(r.error){log('Sign-in failed: '+r.error,'err');return;}
      token=r.access_token; log('Signed in.','ok'); signedIn(true);
      try{ await ensureFolder(); await loadImages(); }catch(e){ log(e.message,'err'); }
    }});
    log('Library ready. You can sign in.','dim');
  }
  $('signin').onclick=()=>{ if(tokenClient) tokenClient.requestAccessToken({prompt:'consent'}); };
  $('signout').onclick=()=>{ if(token) google.accounts.oauth2.revoke(token,()=>{}); token=null;folderId=null;signedIn(false);$('form').style.display='none';$('wallWrap').innerHTML='';log('Signed out.','dim'); };
  $('reload').onclick=async()=>{ try{ await loadImages(); }catch(e){ log(e.message,'err'); } };
  $('pick').onclick=()=>$('file').click();

  async function api(url,opts){
    const r=await fetch(url,opts||{headers:auth()});
    if(r.status===401){ log('Session expired — sign in again.','err'); signedIn(false); throw new Error('401'); }
    if(!r.ok){ throw new Error('HTTP '+r.status+': '+(await r.text()).slice(0,200)); }
    return r;
  }
  async function ensureFolder(){
    const q="mimeType='application/vnd.google-apps.folder' and name='"+FOLDER+"' and trashed=false";
    const d=await (await api('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name)',{headers:auth()})).json();
    if(d.files&&d.files.length){ folderId=d.files[0].id; log('Found your daybook folder.','dim'); return; }
    const cr=await api('https://www.googleapis.com/drive/v3/files?fields=id',{method:'POST',headers:Object.assign(auth(),{'Content-Type':'application/json'}),body:JSON.stringify({name:FOLDER,mimeType:'application/vnd.google-apps.folder'})});
    folderId=(await cr.json()).id; log('Created a daybook folder in your Drive.','ok');
  }

  function pickFrame(ratio){let best='square',bd=9;for(const k in FRAMES){const d=Math.abs(Math.log(ratio/FRAMES[k].r));if(d<bd){bd=d;best=k;}}return best;}

  async function processFile(file){
    let w,h,bitmap=null;
    try{ bitmap=await createImageBitmap(file,{imageOrientation:'from-image'}); w=bitmap.width; h=bitmap.height; }
    catch(_){ const im=await new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=URL.createObjectURL(file);}); w=im.naturalWidth;h=im.naturalHeight;bitmap=im; }
    const max=1600, scale=Math.min(1,max/Math.max(w,h)), cw=Math.round(w*scale), ch=Math.round(h*scale);
    const cv=document.createElement('canvas'); cv.width=cw; cv.height=ch; cv.getContext('2d').drawImage(bitmap,0,0,cw,ch);
    const blob=await new Promise(res=>cv.toBlob(res,'image/jpeg',0.85));
    return {blob, ratio:w/h, srcW:w, srcH:h, outW:cw, outH:ch};
  }

  $('file').onchange=async(ev)=>{
    const file=ev.target.files&&ev.target.files[0]; if(!file) return;
    log('Reading "'+file.name+'" ('+Math.round(file.size/1024)+' KB)…','step');
    try{
      const p=await processFile(file);
      if(cur&&cur.url) URL.revokeObjectURL(cur.url);
      const url=URL.createObjectURL(p.blob);
      cur={blob:p.blob, ratio:p.ratio, frame:pickFrame(p.ratio), px:50, py:50, url};
      log('Straightened and shrunk to '+p.outW+'×'+p.outH+' ('+Math.round(p.blob.size/1024)+' KB). Original was '+p.srcW+'×'+p.srcH+'.','ok');
      log('Nearest frame for this shape: '+FRAMES[cur.frame].label+'.','dim');
      $('form').style.display='block'; $('prevImg').src=url; renderEditor();
    }catch(e){ log('Could not read that image: '+e.message,'err'); }
    ev.target.value='';
  };

  function renderEditor(){
    $('frames').innerHTML=Object.keys(FRAMES).map(k=>'<button class="seg" data-f="'+k+'" aria-pressed="'+(k===cur.frame)+'">'+FRAMES[k].label+'</button>').join('');
    $('frames').querySelectorAll('button').forEach(b=>b.onclick=()=>{cur.frame=b.dataset.f;applyPreview();$('frames').querySelectorAll('button').forEach(x=>x.setAttribute('aria-pressed',x.dataset.f===cur.frame));});
    $('px').value=cur.px; $('py').value=cur.py;
    $('px').oninput=()=>{cur.px=+$('px').value;applyPreview();};
    $('py').oninput=()=>{cur.py=+$('py').value;applyPreview();};
    $('autonote').textContent='Auto-fitted to '+FRAMES[cur.frame].label.toLowerCase()+'. Override the frame or nudge the crop.';
    applyPreview();
  }
  function applyPreview(){
    const pv=$('preview'); pv.style.setProperty('--ar',FRAMES[cur.frame].ar);
    pv.style.setProperty('--px',cur.px+'%'); pv.style.setProperty('--py',cur.py+'%');
  }

  $('save').onclick=async()=>{
    if(!cur||!folderId){ log('Nothing to save yet.','err'); return; }
    $('saving').textContent='saving…';
    try{
      const part=$('part').value, caption=$('caption').value;
      log('Uploading the photo to Part '+part+'…','step');
      const meta={name:'IMG-'+part+'-'+Date.now()+'.jpg',mimeType:'image/jpeg',parents:[folderId],
        appProperties:{app:'daybook',part,type:'Photo',kind:'Evidence',caption,frame:cur.frame,px:String(cur.px),py:String(cur.py)}};
      const boundary='img'+Date.now();
      const pre='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(meta)+'\r\n--'+boundary+'\r\nContent-Type: image/jpeg\r\n\r\n';
      const body=new Blob([pre, cur.blob, '\r\n--'+boundary+'--'],{type:'multipart/related; boundary='+boundary});
      await api('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',{method:'POST',headers:Object.assign(auth(),{'Content-Type':'multipart/related; boundary='+boundary}),body});
      log('Saved the photo to Drive, framed as '+cur.frame+'.','ok');
      $('saving').textContent=''; $('form').style.display='none';
      if(cur.url) URL.revokeObjectURL(cur.url); cur=null;
      await loadImages();
    }catch(e){ log('Upload failed: '+e.message,'err'); $('saving').textContent=''; }
  };

  async function loadImages(){
    log('Rebuilding your image wall from Drive…','step');
    urls.forEach(u=>URL.revokeObjectURL(u)); urls=[];
    const q="'"+folderId+"' in parents and trashed=false and mimeType contains 'image/'";
    const d=await (await api('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,appProperties,createdTime)&orderBy=createdTime&pageSize=200',{headers:auth()})).json();
    const files=d.files||[];
    log('Found '+files.length+' photo'+(files.length===1?'':'s')+' in Drive.','ok');
    const shots=await Promise.all(files.map(async f=>{
      const b=await (await api('https://www.googleapis.com/drive/v3/files/'+f.id+'?alt=media',{headers:auth()})).blob();
      const u=URL.createObjectURL(b); urls.push(u);
      const a=f.appProperties||{};
      return {id:f.id,url:u,part:a.part||'C',caption:a.caption||'',frame:a.frame||'square',px:a.px||'50',py:a.py||'50'};
    }));
    renderWall(shots);
  }
  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function renderWall(shots){
    if(!shots.length){ $('wallWrap').innerHTML='<p style="color:#9aa1a9;font-style:italic">No photos yet — add one above.</p>'; return; }
    let html='<h2 style="font-size:16px;margin:6px 0 12px">Your photos ('+shots.length+')</h2><div class="wall">';
    shots.forEach(s=>{
      const ar=(FRAMES[s.frame]||FRAMES.square).ar;
      html+='<div class="shot"><div class="frame" style="--ar:'+ar+';--px:'+esc(s.px)+'%;--py:'+esc(s.py)+'%"><img src="'+s.url+'" alt=""></div>'+
        '<span class="pchip p'+s.part+'">Part '+s.part+'</span><div class="cap">'+esc(s.caption)+'</div>'+
        '<div style="margin-top:5px"><button class="tiny" onclick="delImg(\''+s.id+'\')">delete</button></div></div>';
    });
    html+='</div>'; $('wallWrap').innerHTML=html;
  }
  window.delImg=async(id)=>{ if(!confirm('Delete this photo from your Drive?'))return; try{ await api('https://www.googleapis.com/drive/v3/files/'+id,{method:'DELETE',headers:auth()}); log('Deleted a photo.','dim'); await loadImages(); }catch(e){ log('Delete failed: '+e.message,'err'); } };
</script>
</body>
</html>
